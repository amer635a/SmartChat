steps:
- action: ask_choice
  question: Do you have permission to access Balena?
  options:
  - label: 'Yes'
    value: 'yes'
  - label: 'No'
    value: 'no'
  branches:
    'yes':
    - action: call_scenario
      target_scenario: collect_balena_info
    - action: call_scenario
      target_scenario: run_battery_check
    - action: end
    'no':
    - action: end
      message: We can't help with this right now. Balena access is required to troubleshoot
        battery connection issues. Please obtain the necessary permissions and try
        again.
