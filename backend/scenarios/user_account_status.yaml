id: user_account_status
name: User Account Status
description: Look up a user account status and optionally reset password or toggle activation.

training_phrases:
  - "check user account status"
  - "is this user active"
  - "look up account"
  - "user account info"
  - "check if user is locked"
  - "account status"
  - "find user account"
  - "user status check"

steps:
  - action: ask_input
    question: "What is the user's email address?"
    input_key: user_email
    validation: email

  - action: run_script
    script: get_account_status.py
    args:
      email: "$input.user_email"
    display_message: "Account status:"

  - action: ask_choice
    question: "What would you like to do?"
    options:
      - label: "Reset password"
        value: "reset_password"
      - label: "Toggle activation"
        value: "toggle_activation"
      - label: "Nothing, we're done"
        value: "done"
    branches:
      reset_password:
        - action: run_script
          script: reset_password.py
          args:
            email: "$input.user_email"
          display_message: "Password has been reset:"

        - action: end
          message: "Password reset complete. Is there anything else?"

      toggle_activation:
        - action: run_script
          script: toggle_activation.py
          args:
            email: "$input.user_email"
          display_message: "Account activation toggled:"

        - action: end
          message: "Activation status updated. Is there anything else?"

      done:
        - action: end
          message: "No problem. Is there anything else I can help with?"
